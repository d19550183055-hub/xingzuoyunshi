<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星缘启示录 | Stellar Revelations 78°</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Design Tokens --- */
        :root {
            --stellar-bg: #05070a;
            --stellar-accent: #8e7dff;
            --stellar-gold: #d4af37;
            --slant-angle: 78deg;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        /* --- Global Styles --- */
        body {
            background: #05070a;
            color: #e0e0e0;
            font-family: 'Noto Serif SC', serif;
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .cinzel { font-family: 'Cinzel', serif; }

        /* --- 强烈倾斜背景 --- */
        .slant-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        /* 这里的渐变线严格按照 78 度旋转 */
        .slant-line {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                78deg,
                transparent,
                transparent 49.9%,
                rgba(142, 125, 255, 0.05) 50%,
                transparent 50.1%,
                transparent 100%
            );
            background-size: 100px 100px;
            transform: rotate(2deg); /* 微调旋转增加动态感 */
        }

        /* --- 主容器倾斜优化 --- */
        #mainApp {
            transform: skewY(-1.5deg); /* 整体容器产生物理倾斜感 */
            transform-origin: left top;
        }

        .reverse-skew {
            transform: skewY(1.5deg); /* 文字和内容反向倾斜，确保易读性 */
        }

        /* --- 晶体面板（强烈切角） --- */
        .crystal-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            /* 模拟 78 度切割的梯形/平行四边形效果 */
            clip-path: polygon(3% 0%, 100% 0%, 97% 100%, 0% 100%); 
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 首页入口 */
        #landingPage {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 78% 78%, #1a1b3a 0%, #05070a 100%);
            transition: opacity 0.8s ease;
        }

        /* 星座网格 */
        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .zodiac-grid {
                grid-template-columns: repeat(6, 1fr);
                gap: 1.5rem;
            }
        }

        .zodiac-item {
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            /* 个体元素也保持 78 度斜切 */
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%);
            -webkit-tap-highlight-color: transparent;
        }

        .zodiac-item.active {
            background: rgba(142, 125, 255, 0.25);
            box-shadow: inset 0 0 20px rgba(142, 125, 255, 0.2);
            transform: scale(1.05) skewX(-2deg);
        }

        /* 按钮设计 */
        .btn-action {
            background: linear-gradient(78deg, #6366f1 0%, #a855f7 100%);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: all 0.3s ease;
            font-weight: bold;
            letter-spacing: 0.1em;
        }

        .btn-action:hover {
            filter: brightness(1.2);
            transform: translateX(5px);
        }

        /* 结果文字区域 */
        .prose h3 { 
            color: var(--stellar-gold); 
            font-size: 1.1rem; 
            margin-top: 1.5rem; 
            background: linear-gradient(78deg, rgba(212,175,55,0.15), transparent);
            padding: 0.6rem 1rem;
            clip-path: polygon(2% 0, 100% 0, 98% 100%, 0 100%);
        }

        .fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
        
        .loading-spinner {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="slant-container">
        <div class="slant-line"></div>
    </div>

    <!-- Section: Landing Page -->
    <div id="landingPage">
        <div class="mb-12 text-center" style="transform: skewX(-12deg);">
            <h1 class="cinzel text-6xl md:text-8xl font-bold tracking-[0.2em] text-white opacity-90">
                STELLAR
            </h1>
            <h1 class="cinzel text-5xl md:text-7xl font-bold tracking-[0.3em] text-purple-500 mt-2">
                REVELATIONS
            </h1>
            <div class="mt-4 text-xs tracking-[1em] text-gold-500 text-yellow-600 font-bold">AZIMUTH 78° SYSTEM</div>
        </div>
        <button onclick="App.ui.enter()" class="cinzel px-16 py-4 border border-purple-500/50 text-white tracking-[0.4em] hover:bg-purple-500/20 transition-all duration-700 bg-black/40">
            INITIATE SCAN
        </button>
    </div>

    <!-- Section: Main Application -->
    <div id="mainApp" class="max-w-6xl mx-auto opacity-0 transition-opacity duration-1000">
        <div class="reverse-skew">
            <header class="flex justify-between items-baseline mb-16 border-b border-purple-900/30 pb-6">
                <div>
                    <h2 class="cinzel text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-yellow-200">星缘启示录</h2>
                    <p class="text-[10px] text-purple-400/60 uppercase tracking-[0.4em] mt-1">Stellar Vector Analysis v2.5</p>
                </div>
                <div class="text-right">
                    <span id="currentTime" class="text-sm font-mono text-gray-500 tracking-tighter">00:00:00</span>
                </div>
            </header>

            <main class="space-y-12">
                <!-- Zodiac Grid -->
                <section>
                    <div class="zodiac-grid" id="zodiacContainer"></div>
                </section>

                <!-- Control Console -->
                <div class="flex flex-col md:flex-row gap-8 items-center">
                    <div class="flex p-1 bg-white/5 rounded-sm w-full md:w-auto" style="clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);">
                        <button id="btn-daily" onclick="App.state.setTime('daily')" class="flex-1 px-8 py-2 text-xs transition-all bg-white/10">今日观测</button>
                        <button id="btn-monthly" onclick="App.state.setTime('monthly')" class="flex-1 px-8 py-2 text-xs transition-all">月度相位</button>
                        <button id="btn-yearly" onclick="App.state.setTime('yearly')" class="flex-1 px-8 py-2 text-xs transition-all">年度星图</button>
                    </div>
                    
                    <button onclick="App.core.predict()" class="btn-action w-full md:w-auto px-16 py-4 text-white flex items-center justify-center gap-4 shadow-lg shadow-purple-500/20">
                        <span id="btnText" class="tracking-[0.3em]">同步星场频率</span>
                        <div id="loader" class="loading-spinner hidden"></div>
                    </button>
                </div>

                <!-- Result Panel -->
                <section id="resultArea" class="hidden crystal-panel p-10 md:p-16 relative">
                    <div class="relative z-10">
                        <div class="flex items-center gap-8 mb-12 border-l-4 border-purple-500 pl-6">
                            <div id="resultIcon" class="text-7xl text-purple-400"></div>
                            <div>
                                <h3 id="resultTitle" class="text-3xl font-bold text-white tracking-widest !bg-transparent !p-0 !border-0 !mt-0"></h3>
                                <p id="resultSubtitle" class="text-xs text-purple-400/50 mt-2 font-mono uppercase tracking-widest"></p>
                            </div>
                        </div>
                        <div id="textContent" class="prose prose-invert max-w-none text-gray-300 leading-loose"></div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script>
        /**
         * @namespace App
         * Advanced 78° Slant Astrology System
         */
        const App = {
            config: {
                apiKey: "",
                model: "gemini-2.5-flash-preview-09-2025",
                zodiacs: [
                    { id: 'aries', name: '白羊', icon: '♈', date: '3.21' },
                    { id: 'taurus', name: '金牛', icon: '♉', date: '4.20' },
                    { id: 'gemini', name: '双子', icon: '♊', date: '5.21' },
                    { id: 'cancer', name: '巨蟹', icon: '♋', date: '6.22' },
                    { id: 'leo', name: '狮子', icon: '♌', date: '7.23' },
                    { id: 'virgo', name: '处女', icon: '♍', date: '8.23' },
                    { id: 'libra', name: '天秤', icon: '♎', date: '9.23' },
                    { id: 'scorpio', name: '天蝎', icon: '♏', date: '10.24' },
                    { id: 'sagittarius', name: '射手', icon: '♐', date: '11.23' },
                    { id: 'capricorn', name: '摩羯', icon: '♑', date: '12.22' },
                    { id: 'aquarius', name: '水瓶', icon: '♒', date: '1.20' },
                    { id: 'pisces', name: '双鱼', icon: '♓', date: '2.19' }
                ]
            },

            state: {
                selectedZodiac: null,
                timeRange: 'daily',
                
                setTime(range) {
                    this.timeRange = range;
                    document.querySelectorAll('[id^="btn-"]').forEach(btn => 
                        btn.classList.toggle('bg-white/10', btn.id === `btn-${range}`)
                    );
                }
            },

            ui: {
                enter() {
                    document.getElementById('landingPage').classList.add('fade-out');
                    document.getElementById('mainApp').classList.replace('opacity-0', 'opacity-100');
                    this.startClock();
                },

                startClock() {
                    const timer = document.getElementById('currentTime');
                    setInterval(() => {
                        const now = new Date();
                        timer.textContent = now.toTimeString().split(' ')[0];
                    }, 1000);
                },

                renderMarkdown(md) {
                    // 增强渲染，适配 78 度风格
                    return md
                        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                        .replace(/^## (.*$)/gim, '<h3>$1</h3>')
                        .replace(/【(.*?)】/g, '<span class="text-purple-400 font-bold">【$1】</span>')
                        .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-bold">$1</strong>')
                        .split('\n').map(l => l.trim() ? `<p class="mb-6 opacity-90">${l}</p>` : '').join('');
                }
            },

            core: {
                async predict() {
                    const { state, ui } = App;
                    if (!state.selectedZodiac) return alert("坐标未定位：请选择所属星宫");

                    const btnText = document.getElementById('btnText');
                    const loader = document.getElementById('loader');
                    const textContent = document.getElementById('textContent');
                    const resultArea = document.getElementById('resultArea');

                    loader.classList.remove('hidden');
                    btnText.textContent = "正在解析 78° 相位...";
                    resultArea.classList.remove('hidden');
                    textContent.innerHTML = `<div class="p-8 text-center text-purple-400 animate-pulse tracking-widest">DECODING STELLAR VECTORS...</div>`;

                    const prompt = `你是占星专家。为${state.selectedZodiac.name}座提供${state.timeRange}分析。包含：星能相位、事业机遇、情感波频、财富磁场、78度角建议。Markdown格式。语气神秘且理性。`;

                    try {
                        const result = await App.api.call(prompt);
                        this.showResult(result);
                    } catch (e) {
                        textContent.innerHTML = `<p class="text-red-500 p-8 border border-red-500/20">观测中断：无法链接星场 (Error: ${e.message})</p>`;
                    } finally {
                        loader.classList.add('hidden');
                        btnText.textContent = "同步星场频率";
                    }
                },

                showResult(text) {
                    const { state, ui } = App;
                    document.getElementById('resultIcon').textContent = state.selectedZodiac.icon;
                    document.getElementById('resultTitle').textContent = `${state.selectedZodiac.name}座 · 深度相位报告`;
                    document.getElementById('resultSubtitle').textContent = `Vector: 78° / T: ${new Date().toISOString()}`;
                    document.getElementById('textContent').innerHTML = ui.renderMarkdown(text);
                    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
                }
            },

            api: {
                async call(prompt) {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${App.config.model}:generateContent?key=${App.config.apiKey}`;
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "你是一位精通高维占星术的大师，善于从方位角和星体相位中提取命运信息。" }] }
                        })
                    });
                    if (!res.ok) throw new Error("API Connection Failed");
                    const data = await res.json();
                    return data.candidates[0].content.parts[0].text;
                }
            },

            init() {
                const grid = document.getElementById('zodiacContainer');
                App.config.zodiacs.forEach(z => {
                    const div = document.createElement('div');
                    div.className = 'zodiac-item p-6 flex flex-col items-center justify-center';
                    div.innerHTML = `
                        <span class="text-4xl mb-2">${z.icon}</span>
                        <span class="text-xs font-bold tracking-tighter">${z.name}</span>
                        <span class="text-[7px] opacity-30 mt-1 font-mono">${z.date}</span>
                    `;
                    div.onclick = () => {
                        document.querySelectorAll('.zodiac-item').forEach(i => i.classList.remove('active'));
                        div.classList.add('active');
                        App.state.selectedZodiac = z;
                    };
                    grid.appendChild(div);
                });
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
